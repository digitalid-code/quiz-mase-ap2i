<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz MASE – AP2I – Machines & Outils</title>
<style>
  :root {
    --navy:    #1B3A6B;
    --orange:  #E8521A;
    --light:   #F4F6F9;
    --white:   #FFFFFF;
    --text:    #1C2B42;
    --muted:   #607090;
    --success: #1E7E34;
    --danger:  #B91C1C;
    --warn:    #D97706;
    --mid:     #D0D9E8;
    --shadow:  0 4px 16px rgba(27,58,107,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Calibri, Arial, sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-shield { font-size: 28px; }
  .header-title { color: white; font-size: 18px; font-weight: 700; }
  .header-sub { color: #A8BEDD; font-size: 12px; margin-top: 2px; }
  .header-badge {
    margin-left: auto; background: var(--orange);
    color: white; font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px; letter-spacing: 1px;
  }

  /* ── MAIN ── */
  .main { max-width: 800px; margin: 0 auto; padding: 32px 16px 64px; }

  /* ── PARTICIPANT FORM ── */
  .participant-card {
    background: white; border-radius: 12px;
    padding: 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange);
  }
  .participant-card h2 { color: var(--navy); font-size: 20px; margin-bottom: 8px; }
  .participant-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--mid);
    border-radius: 8px; font-size: 14px; color: var(--text);
    background: var(--light); transition: border 0.2s;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: var(--navy); background: white;
  }
  .form-group select { cursor: pointer; }

  /* ── TOPIC BANNER ── */
  .topic-banner {
    background: var(--navy); color: white;
    border-radius: 10px; padding: 16px 20px;
    margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start;
  }
  .topic-banner .topic-icon { font-size: 28px; flex-shrink: 0; }
  .topic-banner h3 { font-size: 16px; margin-bottom: 4px; }
  .topic-banner p { font-size: 12px; color: #A8BEDD; }

  .btn-start {
    width: 100%; padding: 14px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.2s; letter-spacing: 0.5px;
    margin-top: 8px;
  }
  .btn-start:hover { background: #142D55; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin-bottom: 28px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--navy); }
  .progress-count { font-size: 13px; color: var(--muted); }
  .progress-bar { height: 8px; background: var(--mid); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--navy); border-radius: 4px; transition: width 0.4s ease; }

  /* ── QUESTION CARD ── */
  .question-card {
    background: white; border-radius: 12px;
    padding: 28px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--navy);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .question-meta { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .question-text { font-size: 17px; font-weight: 700; color: var(--navy); line-height: 1.5; margin-bottom: 24px; }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 13px 18px; border: 2px solid var(--mid);
    border-radius: 10px; cursor: pointer; display: flex; gap: 12px;
    align-items: flex-start; background: var(--light); transition: all 0.18s;
    font-size: 14px; color: var(--text); line-height: 1.4;
  }
  .option:hover:not(.disabled) { border-color: var(--navy); background: #EDF2FA; }
  .option .opt-letter {
    font-size: 12px; font-weight: 700; color: var(--navy);
    background: var(--mid); border-radius: 50%;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .option.correct  { border-color: var(--success); background: #EBF8F0; }
  .option.wrong    { border-color: var(--danger);  background: #FDECEA; }
  .option.correct .opt-letter { background: var(--success); color: white; }
  .option.wrong .opt-letter   { background: var(--danger);  color: white; }
  .option.disabled { cursor: default; opacity: 0.9; }

  /* ── FEEDBACK ── */
  .feedback {
    margin-top: 20px; padding: 14px 18px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.55;
    animation: fadeIn 0.3s ease;
  }
  .feedback.correct-fb { background: #EBF8F0; border-left: 4px solid var(--success); color: #154A22; }
  .feedback.wrong-fb   { background: #FDECEA; border-left: 4px solid var(--danger);  color: #7B1C1C; }
  .feedback .fb-title  { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .feedback .fb-ref    { font-size: 11.5px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .btn-next {
    margin-top: 20px; padding: 11px 28px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-next:hover { background: #142D55; }

  /* ── RESULTS ── */
  .results-card {
    background: white; border-radius: 12px;
    padding: 36px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange);
    animation: fadeIn 0.3s ease;
  }
  .results-card h2 { color: var(--navy); font-size: 22px; margin-bottom: 8px; }

  .score-ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 24px 0; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin-bottom: 12px; font-weight: 700;
  }
  .score-circle .sc-pct  { font-size: 36px; color: white; }
  .score-circle .sc-raw  { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .score-success { background: var(--success); }
  .score-partial { background: var(--warn); }
  .score-fail    { background: var(--danger); }

  .score-message { font-size: 15px; font-weight: 700; color: var(--navy); text-align: center; }
  .score-sub     { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }

  .stats-row { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .stat-box {
    flex: 1; min-width: 100px; background: var(--light);
    border-radius: 8px; padding: 14px; text-align: center;
  }
  .stat-box .sb-val { font-size: 22px; font-weight: 700; color: var(--navy); }
  .stat-box .sb-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── REVIEW ── */
  .review-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .review-item {
    border-radius: 8px; overflow: hidden;
    border: 1.5px solid var(--mid);
  }
  .review-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    background: var(--light);
  }
  .review-icon { font-size: 16px; flex-shrink: 0; }
  .review-q { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .review-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .review-item.open .review-chevron { transform: rotate(90deg); }
  .review-body { display: none; padding: 12px 14px; font-size: 13px; background: white; border-top: 1px solid var(--mid); }
  .review-item.open .review-body { display: block; }
  .review-body .rv-your { color: var(--danger); margin-bottom: 4px; }
  .review-body .rv-correct { color: var(--success); margin-bottom: 4px; }
  .review-body .rv-expl { color: var(--muted); font-style: italic; font-size: 12px; }

  /* ── TRACKING STATUS ── */
  .tracking-box {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; display: flex; align-items: center; gap: 10px;
  }
  .tracking-box.sent    { background: #EBF8F0; color: var(--success); }
  .tracking-box.pending { background: #FFF7ED; color: var(--warn); }
  .tracking-box.error   { background: #FDECEA; color: var(--danger); }

  /* ── FOOTER ── */
  .footer {
    background: var(--navy); color: #A8BEDD;
    text-align: center; padding: 14px 16px; font-size: 11px; margin-top: 40px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <span class="header-shield">🛡️</span>
  <div>
    <div class="header-title">Quiz MASE – AP2I</div>
    <div class="header-sub">Risques liés aux machines et aux outils · Avril 2026</div>
  </div>

</div>

<!-- MAIN -->
<div class="main" id="app"></div>

<!-- FOOTER -->
<div class="footer">
  AP2I – Filiale TREMA Multitechnique · Reims · Formation Sécurité · Avril 2026
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxAcSxX0gp_OMD_DreugvJLvO2QYkqCpv_lmLUP4Bzww9fbfFkPaquzq0_zzQ1kurzANg/exec';

// ═══════════════════════════════════════════════════════════════════════════
// QUESTIONS — 10 questions, nouvelles pour Avril 2026
// ═══════════════════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    q: "Parmi les situations suivantes, laquelle représente un danger d'ENTRAÎNEMENT mécanique ?",
    choices: [
      "Inhalation de vapeurs lors du nettoyage d'une armoire électrique",
      "Contact avec une courroie de transmission non protégée par un carter",
      "Glissade sur un sol mouillé à proximité d'une machine",
      "Exposition à un niveau sonore élevé en salle des compresseurs"
    ],
    answer: 1,
    expl: "L'entraînement est un danger mécanique : une courroie, une chaîne ou un engrenage accessible peut attraper vêtements, cheveux ou gants et entraîner un accident grave. Les carters de protection isolent ces organes.",
    ref: "Source : Code du travail Art. R.4324-1"
  },
  {
    q: "Avant de commencer à utiliser un outil portable sur un chantier, quelle vérification est PRIORITAIRE ?",
    choices: [
      "Consulter la fiche produit pour connaître le prix d'achat",
      "Vérifier l'état général de l'outil : absence de fissure, de corrosion et de pièce défaillante",
      "Demander à un collègue si l'outil lui a paru correct lors de sa dernière utilisation",
      "Peindre l'outil aux couleurs d'AP2I pour l'identifier facilement"
    ],
    answer: 1,
    expl: "La réglementation impose de vérifier la conformité de chaque équipement avant utilisation : état général, documents, protecteurs. Un outil défaillant doit être retiré du service immédiatement.",
    ref: "Source : Art. R.4321-4 C. trav."
  },
  {
    q: "Qu'est-ce qu'un carter de protection sur une machine ?",
    choices: [
      "Un bouton d'arrêt d'urgence de couleur rouge",
      "Un équipement de protection individuelle (EPI) porté par l'opérateur",
      "Un dispositif fixe ou mobile qui isole les pièces en mouvement et prévient les contacts accidentels",
      "Un badge magnétique d'accès aux zones à risques"
    ],
    answer: 2,
    expl: "Le carter est un équipement de protection collective (EPC). Fixe ou mobile, il isole mécaniquement les pièces en rotation ou translation. Le retirer pendant le fonctionnement de la machine est strictement interdit.",
    ref: "Source : Art. R.4324-1 C. trav. – Directive Machines 2006/42/CE"
  },
  {
    q: "L'autorisation de conduite d'une machine est délivrée par :",
    choices: [
      "L'inspection du travail, après contrôle sur site",
      "L'employeur, après vérification de l'aptitude médicale, de la formation et de la connaissance des règles de sécurité",
      "Le médecin du travail exclusivement, via un certificat d'aptitude",
      "L'organisme de formation qui a dispensé le stage de conduite"
    ],
    answer: 1,
    expl: "C'est l'employeur qui délivre l'autorisation de conduite. Il vérifie trois conditions cumulatives : aptitude médicale (certificat médecin du travail), savoir-faire technique, et connaissance des règles du site d'intervention.",
    ref: "Source : Art. R.4323-55 C. trav."
  },
  {
    q: "Que signifie 'consigner' une machine avant d'intervenir sur ses organes mécaniques ?",
    choices: [
      "Inscrire la machine dans le registre de maintenance du chantier",
      "La couvrir d'une bâche de protection pour éviter la poussière",
      "Isoler toutes ses sources d'énergie et verrouiller avec un cadenas pour empêcher tout redémarrage accidentel",
      "La déplacer vers une zone isolée du reste du chantier"
    ],
    answer: 2,
    expl: "La consignation est une procédure de sécurité obligatoire : on coupe toutes les sources d'énergie (électrique, pneumatique, hydraulique), on les verrouille avec un cadenas personnel, et on vérifie l'absence d'énergie résiduelle avant d'intervenir.",
    ref: "Source : Art. R.4323-55 et R.4323-56 C. trav."
  },
  {
    q: "Lors d'un perçage susceptible de générer des projections de copeaux métalliques, quel EPI est obligatoire ?",
    choices: [
      "Des gants anti-vibrations pour réduire les microtraumatismes",
      "Des lunettes de protection (EN 166) ou un écran facial",
      "Un casque antibruit (EN 352) de classe 3",
      "Une ceinture de maintien lombaire pour le port de charges"
    ],
    answer: 1,
    expl: "Les projections de copeaux constituent un risque oculaire majeur. Les lunettes de protection (norme EN 166) ou un écran facial sont obligatoires. Un copeau projeté dans l'œil peut causer une incapacité de travail immédiate.",
    ref: "Source : Art. R.4323-95 C. trav. – Norme EN 166"
  },
  {
    q: "Un technicien AP2I constate qu'une machine chez un client présente un protecteur cassé et un arrêt d'urgence non fonctionnel. Quelle est la bonne conduite à tenir ?",
    choices: [
      "Continuer le travail en faisant très attention, sans toucher à la zone protégée",
      "Bricoler rapidement l'arrêt d'urgence pour ne pas retarder le chantier",
      "Arrêter l'utilisation de la machine, baliser la zone et signaler immédiatement au responsable de chantier",
      "Appeler directement le fabricant de la machine pour signaler la panne"
    ],
    answer: 2,
    expl: "Un équipement présentant un défaut de sécurité (protecteur cassé, arrêt d'urgence défaillant) ne doit pas être utilisé. L'arrêt immédiat, le balisage et la remontée d'information sont obligatoires. Modifier ou neutraliser un dispositif de sécurité est une faute grave.",
    ref: "Source : Art. R.4321-4 C. trav."
  },
  {
    q: "L'analyse des risques réalisée avant chaque prestation doit obligatoirement prendre en compte :",
    choices: [
      "Uniquement les risques électriques et les risques de chute de hauteur",
      "Seulement les risques identifiés par le client dans son plan de prévention",
      "Les matériels et équipements utilisés, y compris les outillages et les notices constructeurs",
      "Uniquement les risques propres aux locaux du siège de l'entreprise"
    ],
    answer: 2,
    expl: "La réglementation exige que l'analyse des risques intègre les matériels et équipements, avec les notices constructeurs. Cette obligation s'applique à l'ensemble des activités terrain, quel que soit le chantier.",
    ref: "Source : Art. R.4121-1 C. trav."
  },
  {
    q: "Porter des vêtements amples ou des bijoux à proximité de pièces en rotation expose principalement à quel type de danger ?",
    choices: [
      "Un risque de chute de plain-pied par accrochage sur le sol",
      "Un risque d'entraînement et d'écrasement par happement des vêtements ou bijoux",
      "Un risque d'électrocution par contact avec les parties conductrices",
      "Un risque de projection chimique par réaction avec les lubrifiants"
    ],
    answer: 1,
    expl: "Les vêtements amples, lacets, bijoux ou cheveux longs peuvent être happés par des organes en rotation (courroies, engrenages, arbres). Ce risque d'entraînement peut entraîner des blessures graves voire mortelles. La tenue doit être ajustée, sans partie flottante.",
    ref: "Source : Art. R.4324-1 C. trav."
  },
  {
    q: "Un technicien doit intervenir à proximité d'un engrenage non protégé. Son responsable lui propose deux solutions : (A) remettre en place le carter d'origine, (B) lui fournir des gants renforcés. Laquelle est réglementairement prioritaire, et pourquoi ?",
    choices: [
      "La solution B, car les EPI sont plus rapides à mettre en œuvre et tout aussi efficaces",
      "Les deux solutions sont équivalentes : c'est au technicien de choisir selon sa préférence",
      "La solution A, car les mesures de protection collective priment toujours sur les EPI",
      "La solution B, car les carters gênent l'accès lors des opérations de maintenance"
    ],
    answer: 2,
    expl: "Le Code du travail fixe un ordre de priorité strict dans les principes généraux de prévention : les mesures de protection collective (EPC) doivent être mises en œuvre avant les équipements de protection individuelle (EPI). Remettre le carter est donc obligatoirement la première action à engager. Les EPI ne compensent un risque résiduel que lorsque la protection collective est impossible ou insuffisante.",
    ref: "Source : Art. L.4121-2 C. trav. – Principes généraux de prévention, 8e principe"
  }
];

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  screen: 'participant',          // 'participant' | 'quiz' | 'results'
  participant: { prenom: '', nom: '', poste: '' },
  current: 0,
  answers: [],                    // index of chosen answer per question
  startTime: null,
  trackingStatus: 'pending',      // 'pending' | 'sent' | 'error'
};

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
const app = document.getElementById('app');

function render() {
  if (state.screen === 'participant') renderParticipant();
  else if (state.screen === 'quiz')   renderQuiz();
  else                                renderResults();
}

// ── PARTICIPANT SCREEN ────────────────────────────────────────────────────
function renderParticipant() {
  app.innerHTML = `
    <div class="participant-card">
      <h2>Vos informations</h2>
      <p>Renseignez vos coordonnées avant de commencer le quiz. Vos résultats seront transmis automatiquement.</p>

      <div class="topic-banner">
        <span class="topic-icon">⚙️</span>
        <div>
          <h3>Formation : Risques liés aux machines et aux outils</h3>
          <p>10 questions · Identification des dangers · Vérification équipements · Dispositifs de sécurité · EPI</p>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="prenom">Prénom *</label>
          <input type="text" id="prenom" placeholder="Votre prénom" value="${state.participant.prenom}">
        </div>
        <div class="form-group">
          <label for="nom">Nom *</label>
          <input type="text" id="nom" placeholder="Votre nom" value="${state.participant.nom}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="poste">Poste / Fonction</label>
          <input type="text" id="poste" placeholder="Ex : Électricien industriel, Automaticien…" value="${state.participant.poste !== '-' ? state.participant.poste : ''}">
        </div>
      </div>

      <button class="btn-start" onclick="startQuiz()">Commencer le quiz →</button>
    </div>


  `;
}

function startQuiz() {
  const p = document.getElementById('prenom').value.trim();
  const n = document.getElementById('nom').value.trim();
  const po = document.getElementById('poste').value;
  if (!p || !n) { alert('Veuillez renseigner votre prénom et votre nom.'); return; }
  state.participant = { prenom: p, nom: n, poste: po || '-' };
  state.current = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.screen = 'quiz';
  render();
}

// ── QUIZ SCREEN ────────────────────────────────────────────────────────────
function renderQuiz() {
  const idx = state.current;
  const total = QUESTIONS.length;
  const q = QUESTIONS[idx];
  const answered = state.answers[idx] !== undefined;
  const chosen = state.answers[idx];

  const pct = Math.round((idx / total) * 100);
  const letters = ['A', 'B', 'C', 'D'];

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Question ${idx + 1} / ${total}</span>
        <span class="progress-count">${pct}% complété</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-card">
      <div class="question-meta">Risques machines & outils</div>
      <div class="question-text">${q.q}</div>

      <div class="options" id="optList">
        ${q.choices.map((c, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.answer)  cls += ' correct';
            else if (i === chosen && i !== q.answer) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${c}</span>
          </div>`;
        }).join('')}
      </div>

      ${answered ? `
        <div class="feedback ${chosen === q.answer ? 'correct-fb' : 'wrong-fb'}">
          <div class="fb-title">${chosen === q.answer ? '✅ Bonne réponse !' : '❌ Réponse incorrecte'}</div>
          ${q.expl}
          <div class="fb-ref">${q.ref}</div>
        </div>
        <button class="btn-next" onclick="nextQuestion()">
          ${idx + 1 < total ? 'Question suivante →' : 'Voir mes résultats →'}
        </button>
      ` : ''}
    </div>
  `;
}

function selectAnswer(i) {
  if (state.answers[state.current] !== undefined) return;
  state.answers[state.current] = i;
  render();
}

function nextQuestion() {
  if (state.current + 1 < QUESTIONS.length) {
    state.current++;
    render();
  } else {
    state.screen = 'results';
    sendToSheets();
    render();
  }
}

// ── RESULTS SCREEN ─────────────────────────────────────────────────────────
function renderResults() {
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const pct   = Math.round((score / total) * 100);
  const dur   = Math.round((Date.now() - state.startTime) / 60000);

  const ringCls = pct >= 70 ? 'score-success' : pct >= 50 ? 'score-partial' : 'score-fail';
  const msg     = pct >= 70
    ? 'Formation validée – Bon travail !'
    : pct >= 50
    ? 'Des lacunes persistent – Revoir le support de formation'
    : 'Score insuffisant – Une révision complète est nécessaire';

  const reviewItems = QUESTIONS.map((q, i) => {
    const a = state.answers[i];
    const ok = a === q.answer;
    const letters = ['A', 'B', 'C', 'D'];
    return `
      <div class="review-item" id="rv${i}">
        <div class="review-header" onclick="toggleReview(${i})">
          <span class="review-icon">${ok ? '✅' : '❌'}</span>
          <span class="review-q">Q${i+1} – ${q.q.substring(0, 70)}…</span>
          <span class="review-chevron">▶</span>
        </div>
        <div class="review-body">
          ${!ok ? `<div class="rv-your">Votre réponse : ${letters[a]} – ${q.choices[a]}</div>` : ''}
          <div class="rv-correct">✔ Bonne réponse : ${letters[q.answer]} – ${q.choices[q.answer]}</div>
          <div class="rv-expl">${q.expl}</div>
          <div class="rv-expl" style="margin-top:4px;">${q.ref}</div>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="results-card">
      <h2>Résultats de ${state.participant.prenom} ${state.participant.nom}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;">
        Poste : ${state.participant.poste} &nbsp;·&nbsp; Durée : ${dur} min &nbsp;·&nbsp; Avril 2026
      </p>

      <div class="score-ring-wrap">
        <div class="score-circle ${ringCls}">
          <span class="sc-pct">${pct}%</span>
          <span class="sc-raw">${score} / ${total}</span>
        </div>
        <div class="score-message">${msg}</div>
        <div class="score-sub">Seuil de validation : 70%</div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="sb-val" style="color:var(--success)">${score}</div>
          <div class="sb-lbl">Bonnes réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val" style="color:var(--danger)">${total - score}</div>
          <div class="sb-lbl">Mauvaises réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val">${dur}</div>
          <div class="sb-lbl">Minutes</div>
        </div>

      </div>

      <!-- Tracking status -->
      <div class="tracking-box ${state.trackingStatus === 'sent' ? 'sent' : state.trackingStatus === 'error' ? 'error' : 'pending'}" id="trackBox">
        ${state.trackingStatus === 'sent'
          ? '✅ Résultats enregistrés dans Google Sheets'
          : state.trackingStatus === 'error'
          ? '⚠️ Erreur d\'envoi – vérifiez la configuration SHEETS_URL dans le fichier HTML'
          : '⏳ Envoi en cours…'}
      </div>

      <!-- Review -->
      <h3 style="margin-top:24px;color:var(--navy);font-size:16px;">Revue question par question</h3>
      <div class="review-list">${reviewItems}</div>

      <button class="btn-next" style="margin-top:24px" onclick="location.reload()">
        Recommencer le quiz
      </button>
    </div>
  `;
}

function toggleReview(i) {
  const el = document.getElementById('rv' + i);
  el.classList.toggle('open');
  el.querySelector('.review-chevron').textContent = el.classList.contains('open') ? '▼' : '▶';
}

// ═══════════════════════════════════════════════════════════════════════════
// TRACKING — Google Sheets via Apps Script
// ═══════════════════════════════════════════════════════════════════════════
async function sendToSheets() {
  if (!SHEETS_URL) {
    state.trackingStatus = 'error';
    return;
  }
  const now   = new Date();
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const pct   = Math.round((score / total) * 100) + '%';
  const dur   = Math.round((Date.now() - state.startTime) / 60000);

  const details = QUESTIONS.map((q, i) =>
    `Q${i+1}:${state.answers[i] === q.answer ? 'OK' : 'KO'}`
  ).join(' | ');

  const payload = {
    date:        now.toLocaleDateString('fr-FR'),
    heure:       now.toLocaleTimeString('fr-FR'),
    prenom:      state.participant.prenom,
    nom:         state.participant.nom,
    poste:       state.participant.poste || '-',
    score:       score,
    total:       total,
    pourcentage: pct,
    duree:       dur,
    details: details,
    formation: 'Avril 2026 – Panorama MASE'
  };

  try {
    await fetch(SHEETS_URL, {
      method:  'POST',
      mode:    'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    state.trackingStatus = 'sent';
  } catch (err) {
    state.trackingStatus = 'error';
  }

  // Update just the tracking box if results screen is already rendered
  const tb = document.getElementById('trackBox');
  if (tb) {
    tb.className = 'tracking-box ' + (state.trackingStatus === 'sent' ? 'sent' : 'error');
    tb.textContent = state.trackingStatus === 'sent'
      ? '✅ Résultats enregistrés dans Google Sheets'
      : "⚠️ Erreur d'envoi – vérifiez la configuration SHEETS_URL dans le fichier HTML";
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
