<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Sécurité – AP2I – Risques Routiers</title>
<style>
  :root {
    --navy:    #1B3A6B;
    --orange:  #E8521A;
    --light:   #F4F6F9;
    --white:   #FFFFFF;
    --text:    #1C2B42;
    --muted:   #607090;
    --success: #1E7E34;
    --danger:  #B91C1C;
    --warn:    #D97706;
    --mid:     #D0D9E8;
    --shadow:  0 4px 16px rgba(27,58,107,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Calibri, Arial, sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--navy); padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-shield { font-size: 28px; }
  .header-title { color: white; font-size: 18px; font-weight: 700; }
  .header-sub { color: #A8BEDD; font-size: 12px; margin-top: 2px; }

  .main { max-width: 800px; margin: 0 auto; padding: 32px 16px 64px; }

  .participant-card {
    background: white; border-radius: 12px;
    padding: 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange);
  }
  .participant-card h2 { color: var(--navy); font-size: 20px; margin-bottom: 8px; }
  .participant-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--mid);
    border-radius: 8px; font-size: 14px; color: var(--text);
    background: var(--light); transition: border 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--navy); background: white; }

  .topic-banner {
    background: var(--navy); color: white;
    border-radius: 10px; padding: 16px 20px;
    margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start;
  }
  .topic-banner .topic-icon { font-size: 28px; flex-shrink: 0; }
  .topic-banner h3 { font-size: 16px; margin-bottom: 4px; }
  .topic-banner p { font-size: 12px; color: #A8BEDD; }

  .btn-start {
    width: 100%; padding: 14px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.2s; margin-top: 8px;
  }
  .btn-start:hover { background: #142D55; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--navy); }
  .progress-count { font-size: 13px; color: var(--muted); }
  .progress-bar { height: 8px; background: var(--mid); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--navy); border-radius: 4px; transition: width 0.4s ease; }

  .question-card {
    background: white; border-radius: 12px;
    padding: 28px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--navy);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .question-meta { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .question-text { font-size: 17px; font-weight: 700; color: var(--navy); line-height: 1.5; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 13px 18px; border: 2px solid var(--mid);
    border-radius: 10px; cursor: pointer; display: flex; gap: 12px;
    align-items: flex-start; background: var(--light); transition: all 0.18s;
    font-size: 14px; color: var(--text); line-height: 1.4;
  }
  .option:hover:not(.disabled) { border-color: var(--navy); background: #EDF2FA; }
  .option .opt-letter {
    font-size: 12px; font-weight: 700; color: var(--navy);
    background: var(--mid); border-radius: 50%;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .option.correct  { border-color: var(--success); background: #EBF8F0; }
  .option.wrong    { border-color: var(--danger);  background: #FDECEA; }
  .option.correct .opt-letter { background: var(--success); color: white; }
  .option.wrong .opt-letter   { background: var(--danger);  color: white; }
  .option.disabled { cursor: default; }

  .feedback {
    margin-top: 20px; padding: 14px 18px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.55; animation: fadeIn 0.3s ease;
  }
  .feedback.correct-fb { background: #EBF8F0; border-left: 4px solid var(--success); color: #154A22; }
  .feedback.wrong-fb   { background: #FDECEA; border-left: 4px solid var(--danger);  color: #7B1C1C; }
  .feedback .fb-title  { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .feedback .fb-ref    { font-size: 11.5px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .btn-next {
    margin-top: 20px; padding: 11px 28px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .btn-next:hover { background: #142D55; }

  .results-card {
    background: white; border-radius: 12px;
    padding: 36px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange); animation: fadeIn 0.3s ease;
  }
  .results-card h2 { color: var(--navy); font-size: 22px; margin-bottom: 8px; }

  .score-ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 24px 0; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin-bottom: 12px; font-weight: 700;
  }
  .score-circle .sc-pct { font-size: 36px; color: white; }
  .score-circle .sc-raw { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .score-success { background: var(--success); }
  .score-partial { background: var(--warn); }
  .score-fail    { background: var(--danger); }
  .score-message { font-size: 15px; font-weight: 700; color: var(--navy); text-align: center; }
  .score-sub     { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }

  .stats-row { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .stat-box { flex: 1; min-width: 100px; background: var(--light); border-radius: 8px; padding: 14px; text-align: center; }
  .stat-box .sb-val { font-size: 22px; font-weight: 700; color: var(--navy); }
  .stat-box .sb-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .review-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .review-item { border-radius: 8px; overflow: hidden; border: 1.5px solid var(--mid); }
  .review-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; background: var(--light);
  }
  .review-icon { font-size: 16px; flex-shrink: 0; }
  .review-q { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .review-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .review-item.open .review-chevron { transform: rotate(90deg); }
  .review-body { display: none; padding: 12px 14px; font-size: 13px; background: white; border-top: 1px solid var(--mid); }
  .review-item.open .review-body { display: block; }
  .review-body .rv-your    { color: var(--danger); margin-bottom: 4px; }
  .review-body .rv-correct { color: var(--success); margin-bottom: 4px; }
  .review-body .rv-expl    { color: var(--muted); font-style: italic; font-size: 12px; }

  .tracking-box {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; display: flex; align-items: center; gap: 10px;
  }
  .tracking-box.sent    { background: #EBF8F0; color: var(--success); }
  .tracking-box.pending { background: #FFF7ED; color: var(--warn); }
  .tracking-box.error   { background: #FDECEA; color: var(--danger); }

  .footer {
    background: var(--navy); color: #A8BEDD;
    text-align: center; padding: 14px 16px; font-size: 11px; margin-top: 40px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-shield">🚗</span>
  <div>
    <div class="header-title">Quiz Sécurité – AP2I</div>
    <div class="header-sub">Risques routiers et sécurité des déplacements · Mai 2026</div>
  </div>
</div>

<div class="main" id="app"></div>

<div class="footer">
  AP2I – Filiale TREMA Multitechnique · Reims · Formation Sécurité · Mai 2026
</div>

<script>
const SHEETS_URL = '';  // 👈 Coller l'URL Apps Script ici

// ═══════════════════════════════════════════════════════════════════════════
// QUESTIONS
// ═══════════════════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    q: "Quelle est la différence principale entre un accident de trajet et un accident de mission ?",
    choices: [
      "L'accident de trajet survient uniquement en voiture, l'accident de mission peut survenir à pied",
      "L'accident de trajet survient sur le parcours domicile-travail ; l'accident de mission survient lors d'un déplacement effectué pour le compte de l'employeur",
      "Il n'y a aucune différence : les deux sont couverts de la même façon par la Sécurité Sociale",
      "L'accident de mission n'engage pas la responsabilité de l'employeur, contrairement à l'accident de trajet"
    ],
    answer: 1,
    expl: "L'accident de trajet couvre le parcours habituel domicile-lieu de travail. L'accident de mission survient pendant l'exécution du travail, lors d'un déplacement pour le compte de l'employeur — et peut engager sa responsabilité.",
    ref: "Source : Art. L.411-1 et L.411-2 Code de la Sécurité Sociale"
  },
  {
    q: "Quelle est la limite de vitesse sur une route nationale à deux voies, hors agglomération, par temps sec ?",
    choices: [
      "90 km/h",
      "110 km/h",
      "80 km/h",
      "70 km/h"
    ],
    answer: 2,
    expl: "Depuis le 1er juillet 2018 (Loi d'orientation des mobilités), la vitesse maximale sur les routes à deux voies hors agglomération est abaissée à 80 km/h. Cette mesure vise à réduire le nombre de tués sur ces routes.",
    ref: "Source : Art. R.413-2 C. route – Loi 2019-1428 du 24/12/2019"
  },
  {
    q: "Utiliser son téléphone tenu en main au volant, même à l'arrêt à un feu rouge, est :",
    choices: [
      "Toléré si le moteur est coupé",
      "Autorisé uniquement pour lire un message court",
      "Interdit en toutes circonstances — sanction : 135 € et 3 points",
      "Autorisé si le trajet dure moins de 15 minutes"
    ],
    answer: 2,
    expl: "L'usage du téléphone tenu en main est interdit dès lors que le conducteur est au volant d'un véhicule en circulation, y compris à l'arrêt à un feu. La sanction est une amende forfaitaire de 135 € et le retrait de 3 points.",
    ref: "Source : Art. R.412-6-1 C. route"
  },
  {
    q: "Un technicien AP2I ressent une forte envie de dormir à mi-chemin d'un long trajet. Quelle est la seule conduite efficace ?",
    choices: [
      "Ouvrir la vitre et monter le volume de la radio pour rester éveillé",
      "Boire un café et reprendre la route immédiatement",
      "S'arrêter sur une aire de repos et dormir 15 à 20 minutes",
      "Accélérer pour réduire le temps restant de trajet"
    ],
    answer: 2,
    expl: "Ouvrir la vitre, boire du café ou de l'eau froide ne font que repousser brièvement la somnolence. Seul un arrêt suivi d'une sieste de 15 à 20 minutes permet une récupération réelle. 1 accident mortel sur 3 sur autoroute est lié à l'endormissement.",
    ref: "Source : INRS – Prévention du risque routier professionnel"
  },
  {
    q: "Le taux d'alcoolémie légal autorisé pour un conducteur titulaire d'un permis classique est de :",
    choices: [
      "0,8 g/L de sang",
      "0,5 g/L de sang",
      "0,2 g/L de sang",
      "0 g/L de sang (tolérance zéro)"
    ],
    answer: 1,
    expl: "Le taux légal est de 0,5 g/L de sang (soit 0,25 mg/L d'air expiré). Il est abaissé à 0,2 g/L pour les conducteurs en période probatoire. Dès le dépassement de 0,5 g/L, le délit est caractérisé : jusqu'à 2 ans de prison et 4 500 € d'amende.",
    ref: "Source : Art. R.234-1 et L.234-1 C. route"
  },
  {
    q: "Avant de partir en déplacement professionnel, quel document permet de vérifier la conformité réglementaire d'un véhicule ?",
    choices: [
      "La carte grise uniquement",
      "Le dernier bon de carburant",
      "Le rapport de contrôle technique en cours de validité",
      "La facture d'achat du véhicule"
    ],
    answer: 2,
    expl: "Le contrôle technique, obligatoire tous les 2 ans pour les véhicules légers, atteste de la conformité du véhicule aux normes de sécurité en vigueur. Un véhicule circulant avec un contrôle technique périmé expose le conducteur à une contravention et engage la responsabilité de l'employeur.",
    ref: "Source : Art. R.323-1 C. route – Art. R.4321-1 C. trav."
  },
  {
    q: "Lors de l'organisation d'un trajet professionnel, quelle pratique est recommandée pour réduire le risque d'accident ?",
    choices: [
      "Programmer sa destination GPS en roulant pour gagner du temps",
      "Planifier des marges de temps suffisantes pour éviter la conduite sous pression",
      "Enchaîner les trajets sans pause pour finir plus tôt",
      "Conduire sur la bande d'arrêt d'urgence si le trafic est dense"
    ],
    answer: 1,
    expl: "La pression temporelle est l'un des principaux facteurs d'accident en déplacement professionnel. Planifier des marges de temps adaptées permet de rouler sans précipitation et d'intégrer une pause si nécessaire. Le GPS doit être programmé avant de démarrer.",
    ref: "Source : INRS – Risque routier professionnel – Art. L.4121-1 C. trav."
  },
  {
    q: "En cas d'accident de mission, quelle responsabilité de l'employeur peut être engagée s'il n'a pas pris les mesures de prévention nécessaires ?",
    choices: [
      "Aucune — la responsabilité est uniquement celle du conducteur",
      "Une responsabilité uniquement disciplinaire en interne",
      "Une responsabilité civile et potentiellement pénale pour faute inexcusable",
      "Une responsabilité limitée au remboursement des frais médicaux"
    ],
    answer: 2,
    expl: "L'employeur a une obligation légale de sécurité de résultat (Art. L.4121-1 C. trav.). En cas d'accident de mission et d'absence de mesures de prévention adaptées, sa responsabilité civile — voire pénale pour faute inexcusable — peut être engagée.",
    ref: "Source : Art. L.4121-1 C. trav. – Jurisprudence Cour de cassation"
  },
  {
    q: "Un conducteur professionnel consomme un médicament prescrit par son médecin. Quel réflexe de sécurité doit-il avoir avant de prendre le volant ?",
    choices: [
      "Aucun — les médicaments prescrits sont toujours compatibles avec la conduite",
      "Vérifier le pictogramme de niveau de risque sur la boîte du médicament (niveaux 1, 2, 3)",
      "Réduire sa vitesse de 20 km/h quelle que soit la molécule",
      "Attendre 30 minutes après la prise avant de conduire systématiquement"
    ],
    answer: 1,
    expl: "En France, les médicaments comportant un risque pour la conduite affichent un pictogramme à 3 niveaux : niveau 1 (soyez prudent), niveau 2 (soyez très prudent), niveau 3 (ne pas conduire). En cas de doute, consulter son médecin ou pharmacien.",
    ref: "Source : Art. R.412-6 C. route – Arrêté du 8 août 2008"
  },
  {
    q: "Un technicien perd son permis de conduire suite à un retrait de points. Quelle est l'obligation qui s'applique vis-à-vis de son employeur ?",
    choices: [
      "Il n'a aucune obligation d'informer son employeur — c'est une affaire personnelle",
      "Il doit informer son employeur immédiatement, car la conduite est indispensable à son poste",
      "Il peut continuer à conduire les véhicules de l'entreprise le temps de récupérer des points",
      "Il peut conduire tant que l'employeur ne lui a pas demandé de présenter son permis"
    ],
    answer: 1,
    expl: "Pour un salarié dont le poste exige la conduite, la perte du permis constitue une impossibilité d'exercer ses fonctions. Il a l'obligation d'en informer son employeur. Continuer à conduire sans permis valide expose le salarié à des poursuites pénales graves.",
    ref: "Source : Jurisprudence sociale – Cour de cassation, Chambre sociale"
  }
];

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  screen: 'participant',
  participant: { prenom: '', nom: '', poste: '' },
  current: 0,
  answers: [],
  startTime: null,
  trackingStatus: 'pending',
};

const app = document.getElementById('app');

function render() {
  if (state.screen === 'participant') renderParticipant();
  else if (state.screen === 'quiz')   renderQuiz();
  else                                renderResults();
}

// ── PARTICIPANT ───────────────────────────────────────────────────────────
function renderParticipant() {
  app.innerHTML = `
    <div class="participant-card">
      <h2>Vos informations</h2>
      <p>Renseignez vos coordonnées avant de commencer. Vos résultats seront transmis automatiquement.</p>

      <div class="topic-banner">
        <span class="topic-icon">🚗</span>
        <div>
          <h3>Formation : Risques routiers et sécurité des déplacements</h3>
          <p>10 questions · Déplacements professionnels · Code de la route · Entretien véhicules · Responsabilités</p>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="prenom">Prénom *</label>
          <input type="text" id="prenom" placeholder="Votre prénom" value="${state.participant.prenom}">
        </div>
        <div class="form-group">
          <label for="nom">Nom *</label>
          <input type="text" id="nom" placeholder="Votre nom" value="${state.participant.nom}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="poste">Poste / Fonction</label>
          <input type="text" id="poste" placeholder="Ex : Électricien industriel, Automaticien…" value="${state.participant.poste !== '-' ? state.participant.poste : ''}">
        </div>
      </div>
      <button class="btn-start" onclick="startQuiz()">Commencer le quiz →</button>
    </div>
  `;
}

function startQuiz() {
  const p = document.getElementById('prenom').value.trim();
  const n = document.getElementById('nom').value.trim();
  const po = document.getElementById('poste').value.trim();
  if (!p || !n) { alert('Veuillez renseigner votre prénom et votre nom.'); return; }
  state.participant = { prenom: p, nom: n, poste: po || '-' };
  state.current = 0; state.answers = [];
  state.startTime = Date.now(); state.screen = 'quiz';
  render();
}

// ── QUIZ ──────────────────────────────────────────────────────────────────
function renderQuiz() {
  const idx = state.current;
  const total = QUESTIONS.length;
  const q = QUESTIONS[idx];
  const answered = state.answers[idx] !== undefined;
  const chosen = state.answers[idx];
  const pct = Math.round((idx / total) * 100);
  const letters = ['A', 'B', 'C', 'D'];

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Question ${idx + 1} / ${total}</span>
        <span class="progress-count">${pct}% complété</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-card">
      <div class="question-meta">Risques routiers & déplacements</div>
      <div class="question-text">${q.q}</div>

      <div class="options" id="optList">
        ${q.choices.map((c, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.answer)  cls += ' correct';
            else if (i === chosen && i !== q.answer) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${c}</span>
          </div>`;
        }).join('')}
      </div>

      ${answered ? `
        <div class="feedback ${chosen === q.answer ? 'correct-fb' : 'wrong-fb'}">
          <div class="fb-title">${chosen === q.answer ? '✅ Bonne réponse !' : '❌ Réponse incorrecte'}</div>
          ${q.expl}
          <div class="fb-ref">${q.ref}</div>
        </div>
        <button class="btn-next" onclick="nextQuestion()">
          ${idx + 1 < total ? 'Question suivante →' : 'Voir mes résultats →'}
        </button>
      ` : ''}
    </div>
  `;
}

function selectAnswer(i) {
  if (state.answers[state.current] !== undefined) return;
  state.answers[state.current] = i;
  render();
}

function nextQuestion() {
  if (state.current + 1 < QUESTIONS.length) {
    state.current++;
    render();
  } else {
    state.screen = 'results';
    sendToSheets();
    render();
  }
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function renderResults() {
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const pct   = Math.round((score / total) * 100);
  const dur   = Math.round((Date.now() - state.startTime) / 60000);

  const ringCls = pct >= 70 ? 'score-success' : pct >= 50 ? 'score-partial' : 'score-fail';
  const msg = pct >= 70
    ? 'Formation validée – Bon travail !'
    : pct >= 50
    ? 'Des lacunes persistent – Revoir le support de formation'
    : 'Score insuffisant – Une révision complète est nécessaire';

  const reviewItems = QUESTIONS.map((q, i) => {
    const a = state.answers[i];
    const ok = a === q.answer;
    const letters = ['A', 'B', 'C', 'D'];
    return `
      <div class="review-item" id="rv${i}">
        <div class="review-header" onclick="toggleReview(${i})">
          <span class="review-icon">${ok ? '✅' : '❌'}</span>
          <span class="review-q">Q${i+1} – ${q.q.substring(0, 70)}…</span>
          <span class="review-chevron">▶</span>
        </div>
        <div class="review-body">
          ${!ok ? `<div class="rv-your">Votre réponse : ${letters[a]} – ${q.choices[a]}</div>` : ''}
          <div class="rv-correct">✔ Bonne réponse : ${letters[q.answer]} – ${q.choices[q.answer]}</div>
          <div class="rv-expl">${q.expl}</div>
          <div class="rv-expl" style="margin-top:4px;">${q.ref}</div>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="results-card">
      <h2>Résultats de ${state.participant.prenom} ${state.participant.nom}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;">
        Poste : ${state.participant.poste} &nbsp;·&nbsp; Durée : ${dur} min &nbsp;·&nbsp; Mai 2026
      </p>

      <div class="score-ring-wrap">
        <div class="score-circle ${ringCls}">
          <span class="sc-pct">${pct}%</span>
          <span class="sc-raw">${score} / ${total}</span>
        </div>
        <div class="score-message">${msg}</div>
        <div class="score-sub">Seuil de validation : 70%</div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="sb-val" style="color:var(--success)">${score}</div>
          <div class="sb-lbl">Bonnes réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val" style="color:var(--danger)">${total - score}</div>
          <div class="sb-lbl">Mauvaises réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val">${dur}</div>
          <div class="sb-lbl">Minutes</div>
        </div>
      </div>

      <div class="tracking-box ${state.trackingStatus === 'sent' ? 'sent' : state.trackingStatus === 'error' ? 'error' : 'pending'}" id="trackBox">
        ${state.trackingStatus === 'sent'
          ? '✅ Résultats enregistrés dans Google Sheets'
          : state.trackingStatus === 'error'
          ? "⚠️ Erreur d'envoi – vérifiez la configuration dans le fichier HTML"
          : '⏳ Envoi en cours…'}
      </div>

      <h3 style="margin-top:24px;color:var(--navy);font-size:16px;">Revue question par question</h3>
      <div class="review-list">${reviewItems}</div>

      <button class="btn-next" style="margin-top:24px" onclick="location.reload()">Recommencer le quiz</button>
    </div>
  `;
}

function toggleReview(i) {
  const el = document.getElementById('rv' + i);
  el.classList.toggle('open');
  el.querySelector('.review-chevron').textContent = el.classList.contains('open') ? '▼' : '▶';
}

// ── TRACKING ──────────────────────────────────────────────────────────────
async function sendToSheets() {
  if (!SHEETS_URL) { state.trackingStatus = 'error'; return; }
  const now   = new Date();
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const dur   = Math.round((Date.now() - state.startTime) / 60000);
  const details = QUESTIONS.map((q, i) => `Q${i+1}:${state.answers[i] === q.answer ? 'OK' : 'KO'}`).join(' | ');

  const payload = {
    date:        now.toLocaleDateString('fr-FR'),
    heure:       now.toLocaleTimeString('fr-FR'),
    prenom:      state.participant.prenom,
    nom:         state.participant.nom,
    poste:       state.participant.poste || '-',
    score:       score,
    total:       total,
    pourcentage: Math.round((score / total) * 100) + '%',
    duree:       dur,
    details:     details,
    formation:   'Mai 2026 – Risques routiers & déplacements'
  };

  try {
    await fetch(SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    state.trackingStatus = 'sent';
  } catch(err) {
    state.trackingStatus = 'error';
  }

  const tb = document.getElementById('trackBox');
  if (tb) {
    tb.className = 'tracking-box ' + (state.trackingStatus === 'sent' ? 'sent' : 'error');
    tb.textContent = state.trackingStatus === 'sent'
      ? '✅ Résultats enregistrés dans Google Sheets'
      : "⚠️ Erreur d'envoi – vérifiez la configuration dans le fichier HTML";
  }
}

render();
</script>
</body>
</html>
