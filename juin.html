<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Sécurité – AP2I – Sécurité électrique et habilitation</title>
<style>
  :root {
    --navy:    #1B3A6B;
    --orange:  #E8521A;
    --light:   #F4F6F9;
    --white:   #FFFFFF;
    --text:    #1C2B42;
    --muted:   #607090;
    --success: #1E7E34;
    --danger:  #B91C1C;
    --warn:    #D97706;
    --mid:     #D0D9E8;
    --shadow:  0 4px 16px rgba(27,58,107,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Calibri, Arial, sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

  .header {
    background: var(--navy); padding: 18px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  .header-shield { font-size: 28px; }
  .header-title { color: white; font-size: 18px; font-weight: 700; }
  .header-sub { color: #A8BEDD; font-size: 12px; margin-top: 2px; }

  .main { max-width: 800px; margin: 0 auto; padding: 32px 16px 64px; }

  .participant-card {
    background: white; border-radius: 12px;
    padding: 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange);
  }
  .participant-card h2 { color: var(--navy); font-size: 20px; margin-bottom: 8px; }
  .participant-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .form-group { flex: 1; min-width: 200px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--mid);
    border-radius: 8px; font-size: 14px; color: var(--text);
    background: var(--light); transition: border 0.2s;
  }
  .form-group input:focus { outline: none; border-color: var(--navy); background: white; }

  .topic-banner {
    background: var(--navy); color: white;
    border-radius: 10px; padding: 16px 20px;
    margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-start;
  }
  .topic-banner .topic-icon { font-size: 28px; flex-shrink: 0; }
  .topic-banner h3 { font-size: 16px; margin-bottom: 4px; }
  .topic-banner p { font-size: 12px; color: #A8BEDD; }

  .btn-start {
    width: 100%; padding: 14px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.2s; margin-top: 8px;
  }
  .btn-start:hover { background: #142D55; }

  .progress-wrap { margin-bottom: 28px; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--navy); }
  .progress-count { font-size: 13px; color: var(--muted); }
  .progress-bar { height: 8px; background: var(--mid); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--navy); border-radius: 4px; transition: width 0.4s ease; }

  .question-card {
    background: white; border-radius: 12px;
    padding: 28px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--navy);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .question-meta { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .question-text { font-size: 17px; font-weight: 700; color: var(--navy); line-height: 1.5; margin-bottom: 24px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 13px 18px; border: 2px solid var(--mid);
    border-radius: 10px; cursor: pointer; display: flex; gap: 12px;
    align-items: flex-start; background: var(--light); transition: all 0.18s;
    font-size: 14px; color: var(--text); line-height: 1.4;
  }
  .option:hover:not(.disabled) { border-color: var(--navy); background: #EDF2FA; }
  .option .opt-letter {
    font-size: 12px; font-weight: 700; color: var(--navy);
    background: var(--mid); border-radius: 50%;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .option.correct  { border-color: var(--success); background: #EBF8F0; }
  .option.wrong    { border-color: var(--danger);  background: #FDECEA; }
  .option.correct .opt-letter { background: var(--success); color: white; }
  .option.wrong .opt-letter   { background: var(--danger);  color: white; }
  .option.disabled { cursor: default; }

  .feedback {
    margin-top: 20px; padding: 14px 18px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.55; animation: fadeIn 0.3s ease;
  }
  .feedback.correct-fb { background: #EBF8F0; border-left: 4px solid var(--success); color: #154A22; }
  .feedback.wrong-fb   { background: #FDECEA; border-left: 4px solid var(--danger);  color: #7B1C1C; }
  .feedback .fb-title  { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .feedback .fb-ref    { font-size: 11.5px; color: var(--muted); margin-top: 6px; font-style: italic; }

  .btn-next {
    margin-top: 20px; padding: 11px 28px; background: var(--navy);
    color: white; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .btn-next:hover { background: #142D55; }

  .results-card {
    background: white; border-radius: 12px;
    padding: 36px 32px; box-shadow: var(--shadow);
    border-top: 4px solid var(--orange); animation: fadeIn 0.3s ease;
  }
  .results-card h2 { color: var(--navy); font-size: 22px; margin-bottom: 8px; }

  .score-ring-wrap { display: flex; flex-direction: column; align-items: center; margin: 24px 0; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin-bottom: 12px; font-weight: 700;
  }
  .score-circle .sc-pct { font-size: 36px; color: white; }
  .score-circle .sc-raw { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 2px; }
  .score-success { background: var(--success); }
  .score-partial { background: var(--warn); }
  .score-fail    { background: var(--danger); }
  .score-message { font-size: 15px; font-weight: 700; color: var(--navy); text-align: center; }
  .score-sub     { font-size: 13px; color: var(--muted); text-align: center; margin-top: 4px; }

  .stats-row { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
  .stat-box { flex: 1; min-width: 100px; background: var(--light); border-radius: 8px; padding: 14px; text-align: center; }
  .stat-box .sb-val { font-size: 22px; font-weight: 700; color: var(--navy); }
  .stat-box .sb-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .review-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .review-item { border-radius: 8px; overflow: hidden; border: 1.5px solid var(--mid); }
  .review-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; background: var(--light);
  }
  .review-icon { font-size: 16px; flex-shrink: 0; }
  .review-q { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
  .review-chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .review-item.open .review-chevron { transform: rotate(90deg); }
  .review-body { display: none; padding: 12px 14px; font-size: 13px; background: white; border-top: 1px solid var(--mid); }
  .review-item.open .review-body { display: block; }
  .review-body .rv-your    { color: var(--danger); margin-bottom: 4px; }
  .review-body .rv-correct { color: var(--success); margin-bottom: 4px; }
  .review-body .rv-expl    { color: var(--muted); font-style: italic; font-size: 12px; }

  .tracking-box {
    margin-top: 20px; padding: 12px 16px; border-radius: 8px;
    font-size: 13px; display: flex; align-items: center; gap: 10px;
  }
  .tracking-box.sent    { background: #EBF8F0; color: var(--success); }
  .tracking-box.pending { background: #FFF7ED; color: var(--warn); }
  .tracking-box.error   { background: #FDECEA; color: var(--danger); }

  .footer {
    background: var(--navy); color: #A8BEDD;
    text-align: center; padding: 14px 16px; font-size: 11px; margin-top: 40px;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-shield">⚡</span>
  <div>
    <div class="header-title">Quiz Sécurité – AP2I</div>
    <div class="header-sub">Sécurité électrique et habilitation · Juin 2026</div>
  </div>
</div>

<div class="main" id="app"></div>

<div class="footer">
  AP2I – Filiale TREMA Multitechnique · Reims · Formation Sécurité · Juin 2026
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxAcSxX0gp_OMD_DreugvJLvO2QYkqCpv_lmLUP4Bzww9fbfFkPaquzq0_zzQ1kurzANg/exec'; 

// ═══════════════════════════════════════════════════════════════════════════
// QUESTIONS
// ═══════════════════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    q: "À partir de quelle intensité le courant électrique traversant le corps humain peut-il provoquer une tétanisation des muscles respiratoires (impossibilité de lâcher prise) ?",
    choices: [
      "Environ 1 mA",
      "Environ 10 mA",
      "Environ 30 mA",
      "Environ 1 A"
    ],
    answer: 1,
    expl: "Vers 10 mA en courant alternatif apparaît le seuil de non-lâcher : les muscles se contractent et la victime ne peut plus se détacher du conducteur. Le seuil de perception se situe autour de 0,5–1 mA, et la fibrillation ventriculaire devient probable au-delà de 30–40 mA selon la durée de passage.",
    ref: "Source externe : publication INRS ED 6344 / norme NF C 18-510 – à valider par la direction"
  },
  {
    q: "En courant alternatif, à partir de quelle tension de contact parle-t-on de domaine TBT (Très Basse Tension) considéré comme non dangereux en milieu sec ?",
    choices: [
      "Jusqu'à 12 V",
      "Jusqu'à 50 V",
      "Jusqu'à 120 V",
      "Jusqu'à 230 V"
    ],
    answer: 1,
    expl: "En milieu sec, la tension limite conventionnelle de sécurité (UL) en courant alternatif est de 50 V. Elle est abaissée à 25 V en milieu humide et à 12 V dans les enceintes conductrices exiguës. Au-delà, le risque d'électrisation devient significatif.",
    ref: "Source externe : NF C 18-510 / décret 2010-1118 – à valider par la direction"
  },
  {
    q: "Un salarié réalise uniquement des opérations NON électriques (peinture, manutention, nettoyage) dans une zone où existe un risque électrique. Quel niveau d'habilitation minimal lui est nécessaire ?",
    choices: [
      "B1",
      "B2",
      "B0",
      "BR"
    ],
    answer: 2,
    expl: "Le symbole B0 (ou H0 en haute tension) correspond à l'exécutant ou chargé de chantier réalisant des travaux d'ordre NON électrique au voisinage d'installations électriques. Il ne réalise aucune intervention sur l'installation électrique elle-même.",
    ref: "Source externe : NF C 18-510 – à valider par la direction"
  },
  {
    q: "Dans la codification des habilitations électriques, que signifie la lettre « R » dans l'habilitation BR ?",
    choices: [
      "Réparation lourde sur poste de transformation",
      "Intervention générale BT : dépannage, mesurage, raccordement, dans le respect d'un domaine de tension limité",
      "Responsable de la consignation de toute l'installation",
      "Travaux uniquement en haute tension"
    ],
    answer: 1,
    expl: "Le BR désigne le chargé d'intervention générale en basse tension : il réalise dépannages, mesurages, essais et raccordements dans les limites fixées par la norme. À ne pas confondre avec le B2 (chargé de travaux d'ordre électrique) ni le BC (chargé de consignation).",
    ref: "Source externe : NF C 18-510 – à valider par la direction"
  },
  {
    q: "Quelle habilitation est requise pour effectuer la CONSIGNATION électrique d'un équipement (séparer, condamner, identifier, vérifier l'absence de tension) ?",
    choices: [
      "B1V",
      "BC (ou HC en HT)",
      "B0",
      "BE Manœuvre"
    ],
    answer: 1,
    expl: "Le chargé de consignation est titulaire de l'habilitation BC (HC en haute tension). C'est lui qui réalise la mise hors tension et délivre l'attestation de consignation au chargé de travaux avant toute intervention hors tension.",
    ref: "Source externe : NF C 18-510 – à valider par la direction"
  },
  {
    q: "Quelles sont les étapes de la procédure de consignation électrique, dans le bon ordre ?",
    choices: [
      "Vérifier l'absence de tension, puis séparer, puis condamner",
      "Séparer – Condamner – Identifier – Vérifier l'absence de tension (VAT) et mise à la terre si nécessaire",
      "Condamner – Séparer – Mettre à la terre – Identifier",
      "Identifier – Vérifier la tension – Séparer – Travailler"
    ],
    answer: 1,
    expl: "La consignation suit quatre opérations : Séparer l'ouvrage de toute source, Condamner les organes de coupure (cadenas + pancarte), Identifier l'ouvrage sur le lieu de travail, puis Vérifier l'Absence de Tension (VAT) immédiatement suivie de la mise à la terre et en court-circuit si requis. Moyen mnémotechnique : S-C-I-V.",
    ref: "Source externe : NF C 18-510 – à valider par la direction"
  },
  {
    q: "Le travail SOUS tension (TST) par rapport au travail HORS tension consigné :",
    choices: [
      "Est la méthode à privilégier car plus rapide",
      "Constitue l'exception : il n'est autorisé que lorsque la mise hors tension est impossible, avec habilitation spécifique, mode opératoire et autorisation écrite",
      "Ne nécessite aucune habilitation particulière",
      "Est interdit en toutes circonstances en France"
    ],
    answer: 1,
    expl: "La règle générale est de travailler hors tension après consignation. Le travail sous tension reste une exception encadrée : il exige une habilitation TST spécifique, des outils isolés, un mode opératoire validé et une justification de l'impossibilité de consigner.",
    ref: "Source externe : NF C 18-510 / Code du travail R.4544-1 et suivants – à valider par la direction"
  },
  {
    q: "Sur un site client (maison de Champagne, site agroalimentaire…), avant une intervention d'AP2I présentant des risques d'interférence avec l'activité du client, quel document doit obligatoirement être établi et signé ?",
    choices: [
      "Une simple autorisation verbale du chef de site",
      "Le Plan de Prévention (PDP) établi entre l'entreprise utilisatrice et l'entreprise extérieure",
      "Uniquement le DUER d'AP2I",
      "Le PPSPS, qui remplace tout autre document"
    ],
    answer: 1,
    expl: "Le Plan de Prévention formalise l'analyse des risques liés à la coactivité entre l'entreprise utilisatrice (le client) et l'entreprise extérieure (AP2I). Il doit être établi avant le démarrage et porté à la connaissance des intervenants. Le DUER traite des risques propres à l'entreprise ; le PPSPS concerne les chantiers clos du BTP.",
    ref: "Source : Référentiel MASE v2024 (axe Préparation du travail) ; Code du travail R.4512-6 et suivants"
  },
  {
    q: "Selon le référentiel MASE, le titre d'habilitation électrique délivré par l'employeur :",
    choices: [
      "Est valable à vie une fois obtenu",
      "Est émis au regard de l'aptitude médicale et de la validité de la formation, et son recyclage doit être suivi et planifié",
      "Peut être délivré sans formation préalable si le salarié a de l'expérience",
      "N'est exigé que pour les interventions en haute tension"
    ],
    answer: 1,
    expl: "Le MASE demande que le titre d'habilitation soit émis en tenant compte de l'aptitude médicale, de la validité de la formation et de la connaissance des règles de sécurité du lieu d'intervention. L'employeur doit coordonner le recyclage et le renouvellement pour l'ensemble du personnel concerné.",
    ref: "Source : Référentiel MASE v2024 – Compétences et qualifications professionnelles (Formations, Autorisations/Habilitations)"
  },
  {
    q: "Avant d'intervenir sur un automate ou un équipement industriel automatisé, la mise en sécurité doit notamment garantir :",
    choices: [
      "Uniquement la coupure de l'alimentation électrique principale",
      "La coupure ET la consignation de TOUTES les énergies dangereuses (électrique, pneumatique, hydraulique, énergie résiduelle/mécanique)",
      "Que l'automate reste sous tension pour conserver le programme",
      "Le simple passage en mode arrêt depuis l'interface opérateur"
    ],
    answer: 1,
    expl: "La mise en sécurité d'un équipement automatisé impose de maîtriser toutes les sources d'énergie : couper et consigner l'électrique, mais aussi purger ou bloquer les énergies pneumatique, hydraulique et les énergies résiduelles (accumulateurs, ressorts, masses en mouvement). Un simple arrêt logiciel ne protège pas d'un redémarrage intempestif.",
    ref: "Source externe : NF C 18-510 / Code du travail R.4544-1 ; mise en sécurité des équipements (activité AP2I) – à valider par la direction"
  }
];

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
const state = {
  screen: 'participant',
  participant: { prenom: '', nom: '', poste: '' },
  current: 0,
  answers: [],
  startTime: null,
  trackingStatus: 'pending',
};

const app = document.getElementById('app');

function render() {
  if (state.screen === 'participant') renderParticipant();
  else if (state.screen === 'quiz')   renderQuiz();
  else                                renderResults();
}

// ── PARTICIPANT ───────────────────────────────────────────────────────────
function renderParticipant() {
  app.innerHTML = `
    <div class="participant-card">
      <h2>Vos informations</h2>
      <p>Renseignez vos coordonnées avant de commencer. Vos résultats seront transmis automatiquement.</p>

      <div class="topic-banner">
        <span class="topic-icon">⚡</span>
        <div>
          <h3>Formation : Sécurité électrique et habilitation</h3>
          <p>10 questions · Dangers du courant · Niveaux d'habilitation · Consignation · Plan de prévention</p>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="prenom">Prénom *</label>
          <input type="text" id="prenom" placeholder="Votre prénom" value="${state.participant.prenom}">
        </div>
        <div class="form-group">
          <label for="nom">Nom *</label>
          <input type="text" id="nom" placeholder="Votre nom" value="${state.participant.nom}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="poste">Poste / Fonction</label>
          <input type="text" id="poste" placeholder="Ex : Électricien industriel, Automaticien…" value="${state.participant.poste !== '-' ? state.participant.poste : ''}">
        </div>
      </div>
      <button class="btn-start" onclick="startQuiz()">Commencer le quiz →</button>
    </div>
  `;
}

function startQuiz() {
  const p = document.getElementById('prenom').value.trim();
  const n = document.getElementById('nom').value.trim();
  const po = document.getElementById('poste').value.trim();
  if (!p || !n) { alert('Veuillez renseigner votre prénom et votre nom.'); return; }
  state.participant = { prenom: p, nom: n, poste: po || '-' };
  state.current = 0; state.answers = [];
  state.startTime = Date.now(); state.screen = 'quiz';
  render();
}

// ── QUIZ ──────────────────────────────────────────────────────────────────
function renderQuiz() {
  const idx = state.current;
  const total = QUESTIONS.length;
  const q = QUESTIONS[idx];
  const answered = state.answers[idx] !== undefined;
  const chosen = state.answers[idx];
  const pct = Math.round((idx / total) * 100);
  const letters = ['A', 'B', 'C', 'D'];

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">Question ${idx + 1} / ${total}</span>
        <span class="progress-count">${pct}% complété</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="question-card">
      <div class="question-meta">Sécurité électrique & habilitation</div>
      <div class="question-text">${q.q}</div>

      <div class="options" id="optList">
        ${q.choices.map((c, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.answer)  cls += ' correct';
            else if (i === chosen && i !== q.answer) cls += ' wrong';
          }
          return `<div class="${cls}" onclick="selectAnswer(${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>${c}</span>
          </div>`;
        }).join('')}
      </div>

      ${answered ? `
        <div class="feedback ${chosen === q.answer ? 'correct-fb' : 'wrong-fb'}">
          <div class="fb-title">${chosen === q.answer ? '✅ Bonne réponse !' : '❌ Réponse incorrecte'}</div>
          ${q.expl}
          <div class="fb-ref">${q.ref}</div>
        </div>
        <button class="btn-next" onclick="nextQuestion()">
          ${idx + 1 < total ? 'Question suivante →' : 'Voir mes résultats →'}
        </button>
      ` : ''}
    </div>
  `;
}

function selectAnswer(i) {
  if (state.answers[state.current] !== undefined) return;
  state.answers[state.current] = i;
  render();
}

function nextQuestion() {
  if (state.current + 1 < QUESTIONS.length) {
    state.current++;
    render();
  } else {
    state.screen = 'results';
    sendToSheets();
    render();
  }
}

// ── RESULTS ───────────────────────────────────────────────────────────────
function renderResults() {
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const pct   = Math.round((score / total) * 100);
  const dur   = Math.round((Date.now() - state.startTime) / 60000);

  const ringCls = pct >= 70 ? 'score-success' : pct >= 50 ? 'score-partial' : 'score-fail';
  const msg = pct >= 70
    ? 'Formation validée – Bon travail !'
    : pct >= 50
    ? 'Des lacunes persistent – Revoir le support de formation'
    : 'Score insuffisant – Une révision complète est nécessaire';

  const reviewItems = QUESTIONS.map((q, i) => {
    const a = state.answers[i];
    const ok = a === q.answer;
    const letters = ['A', 'B', 'C', 'D'];
    return `
      <div class="review-item" id="rv${i}">
        <div class="review-header" onclick="toggleReview(${i})">
          <span class="review-icon">${ok ? '✅' : '❌'}</span>
          <span class="review-q">Q${i+1} – ${q.q.substring(0, 70)}…</span>
          <span class="review-chevron">▶</span>
        </div>
        <div class="review-body">
          ${!ok ? `<div class="rv-your">Votre réponse : ${letters[a]} – ${q.choices[a]}</div>` : ''}
          <div class="rv-correct">✔ Bonne réponse : ${letters[q.answer]} – ${q.choices[q.answer]}</div>
          <div class="rv-expl">${q.expl}</div>
          <div class="rv-expl" style="margin-top:4px;">${q.ref}</div>
        </div>
      </div>`;
  }).join('');

  app.innerHTML = `
    <div class="results-card">
      <h2>Résultats de ${state.participant.prenom} ${state.participant.nom}</h2>
      <p style="color:var(--muted);font-size:13px;margin-top:4px;">
        Poste : ${state.participant.poste} &nbsp;·&nbsp; Durée : ${dur} min &nbsp;·&nbsp; Juin 2026
      </p>

      <div class="score-ring-wrap">
        <div class="score-circle ${ringCls}">
          <span class="sc-pct">${pct}%</span>
          <span class="sc-raw">${score} / ${total}</span>
        </div>
        <div class="score-message">${msg}</div>
        <div class="score-sub">Seuil de validation : 70%</div>
      </div>

      <div class="stats-row">
        <div class="stat-box">
          <div class="sb-val" style="color:var(--success)">${score}</div>
          <div class="sb-lbl">Bonnes réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val" style="color:var(--danger)">${total - score}</div>
          <div class="sb-lbl">Mauvaises réponses</div>
        </div>
        <div class="stat-box">
          <div class="sb-val">${dur}</div>
          <div class="sb-lbl">Minutes</div>
        </div>
      </div>

      <div class="tracking-box ${state.trackingStatus === 'sent' ? 'sent' : state.trackingStatus === 'error' ? 'error' : 'pending'}" id="trackBox">
        ${state.trackingStatus === 'sent'
          ? '✅ Résultats enregistrés dans Google Sheets'
          : state.trackingStatus === 'error'
          ? "⚠️ Erreur d'envoi – vérifiez la configuration dans le fichier HTML"
          : '⏳ Envoi en cours…'}
      </div>

      <h3 style="margin-top:24px;color:var(--navy);font-size:16px;">Revue question par question</h3>
      <div class="review-list">${reviewItems}</div>

      <button class="btn-next" style="margin-top:24px" onclick="location.reload()">Recommencer le quiz</button>
    </div>
  `;
}

function toggleReview(i) {
  const el = document.getElementById('rv' + i);
  el.classList.toggle('open');
  el.querySelector('.review-chevron').textContent = el.classList.contains('open') ? '▼' : '▶';
}

// ── TRACKING ──────────────────────────────────────────────────────────────
async function sendToSheets() {
  if (!SHEETS_URL) { state.trackingStatus = 'error'; return; }
  const now   = new Date();
  const total = QUESTIONS.length;
  const score = state.answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const dur   = Math.round((Date.now() - state.startTime) / 60000);
  const details = QUESTIONS.map((q, i) => `Q${i+1}:${state.answers[i] === q.answer ? 'OK' : 'KO'}`).join(' | ');

  const payload = {
    date:        now.toLocaleDateString('fr-FR'),
    heure:       now.toLocaleTimeString('fr-FR'),
    prenom:      state.participant.prenom,
    nom:         state.participant.nom,
    poste:       state.participant.poste || '-',
    score:       score,
    total:       total,
    pourcentage: Math.round((score / total) * 100) + '%',
    duree:       dur,
    details:     details,
    formation:   'Juin 2026 – Sécurité électrique et habilitation'
  };

  try {
    await fetch(SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    state.trackingStatus = 'sent';
  } catch(err) {
    state.trackingStatus = 'error';
  }

  const tb = document.getElementById('trackBox');
  if (tb) {
    tb.className = 'tracking-box ' + (state.trackingStatus === 'sent' ? 'sent' : 'error');
    tb.textContent = state.trackingStatus === 'sent'
      ? '✅ Résultats enregistrés dans Google Sheets'
      : "⚠️ Erreur d'envoi – vérifiez la configuration dans le fichier HTML";
  }
}

render();
</script>
</body>
</html>
